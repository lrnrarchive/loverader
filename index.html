<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러브레이더 | 지금 나의 사랑은 어디쯤에 있을까?</title>
    <meta name="description" content="나의 사랑 유형을 알고, 지금 관계의 온도를 확인해보세요. 권태기인지, 사랑이 식은 건지, 단순 피로인지 러브레이더가 알려드릴게요.">
    <meta property="og:title" content="러브레이더 | 지금 나의 사랑은 어디쯤에 있을까?">
    <meta property="og:description" content="나의 사랑 유형을 알고, 지금 관계의 온도를 확인해보세요.">
    <meta property="og:url" content="https://loverader.life">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFAF5;
            --text: #3D3028;
            --text-light: #8C7B6B;
            --accent: #E8A0BF;
            --accent-deep: #C77DA2;
            --border: #F0E6DC;
            --card: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
            max-width: 520px;
            margin: 0 auto;
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(232, 160, 191, 0.25);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-deep);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--accent-deep);
        }

        .sub {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .princess-preview {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .princess-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s;
        }

        .princess-chip:hover {
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .coming-text {
            font-size: 13px;
            color: var(--text-light);
        }

        .footer {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
        }

        .footer a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 8px;
        }

        .footer a:hover {
            color: var(--accent-deep);
        }

        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            .hero { padding: 48px 20px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="logo-mark">💌</div>
        <div class="logo-text">Loveradar</div>
        <h1>지금 나의 사랑은<br><span>어디쯤에 있을까?</span></h1>
        <p class="sub">
            사랑하고 있는 건 아는데, 예전 같지 않은 것 같을 때.<br>
            이게 권태기인지, 진짜 식은 건지, 그냥 피곤한 건지.<br>
            러브레이더가 알려드릴게요.
        </p>

        <div class="princess-preview">
            <div class="princess-chip">🔥 불꽃의 공주</div>
            <div class="princess-chip">🌱 정원의 공주</div>
            <div class="princess-chip">🌙 달빛의 공주</div>
            <div class="princess-chip">🌬️ 바람의 공주</div>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            준비 중이에요
        </div>
        <p class="coming-text">곧 만나요 ✨</p>
    </section>

    <footer class="footer">
        <p>&copy; 2025 러브레이더</p>
    </footer>
</body>
</html>
