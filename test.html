function calcScores(answers) {
  const areas = AREA_CONFIG.map(a => {
    const raw = a.qs.reduce((sum, qid) => sum + (answers[qid] || 0), 0);
    // More generous: boost by 1.2x with a floor of 20% of max
    const base = (raw / a.maxRaw) * a.maxScaled;
    const boosted = Math.min(base * 1.2 + a.maxScaled * 0.08, a.maxScaled);
    const scaled = Math.round(boosted * 10) / 10;
    return { ...a, raw, scaled, pct: Math.round((scaled / a.maxScaled) * 100) };
  });
  const total = Math.min(Math.round(areas.reduce((s, a) => s + a.scaled, 0)), 100);
  return { areas, total };
}

function calcDiagnosis(diagAnswers, totalScore) {
  // 사랑 온도 90 이상이면 무조건 건강한 안정기
  if (totalScore >= 90) return "stable";

  const counts = { boredom: 0, faded: 0, fatigue: 0, stable: 0 };
  Object.values(diagAnswers).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  // Weight D1 and D2 more
  const d1 = diagAnswers.d1, d2 = diagAnswers.d2;
  if (d1) counts[d1] += 0.5;
  if (d2) counts[d2] += 0.5;

  // Love score integration
  if (totalScore >= 75) {
    // 75~89: 안정기 강하게 밀어줌, 식음은 거의 불가
    counts.stable += 4;
    counts.boredom -= 2;
    counts.faded -= 4;
    counts.fatigue -= 1;
  } else if (totalScore >= 60) {
    // 60~74: 피로/권태기까지는 가능하되, 식음은 제한
    counts.stable += 1.5;
    counts.faded -= 2;
  } else if (totalScore >= 45) {
    // 45~59: Phase 3 주도, 약간 보정만
    counts.faded -= 0.5;
  } else {
    // 44 이하: Phase 3 완전 주도 + 식음 가능성 열림
    counts.faded += 1;
  }

  // Prevent negative
  Object.keys(counts).forEach(k => { if (counts[k] < 0) counts[k] = 0; });

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  return sorted[0][0];
}

  return map[diag] || "복합 상태";
}

  optBtn: (selected) => ({ width: "100%", padding: "15px 18px", marginBottom: 10, background: selected ? "rgba(184,160,232,0.15)" : "rgba(255,255,255,0.04)", border: `1px solid ${selected ? "#B8A0E8" : "rgba(255,255,255,0.08)"}`, borderRadius: 12, color: "#F5F0FF", fontSize: 15, fontWeight: 500, textAlign: "left", cursor: "pointer", transition: "all 0.2s", lineHeight: 1.5 }),
  cta: (color) => ({ width: "100%", padding: "16px", background: `linear-gradient(135deg, ${color || "#B8A0E8"}, ${color ? color+"cc" : "#9B7FD4"})`, border: "none", borderRadius: 50, color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", boxShadow: `0 4px 20px ${color || "#B8A0E8"}44`, transition: "transform 0.2s", marginTop: 16 }),
  typeCard: (color, selected) => ({ padding: "22px 18px", background: selected ? `${color}15` : "rgba(255,255,255,0.03)", border: `1px solid ${selected ? color : "rgba(255,255,255,0.08)"}`, borderRadius: 16, cursor: "pointer", transition: "all 0.2s", marginBottom: 12, borderTop: `3px solid ${color}` }),
  badge: (color) => ({ display: "inline-block", padding: "6px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600, background: `${color}20`, color, marginBottom: 8 }),
  areaBar: { height: 8, borderRadius: 4, background: "#2A1F4E", overflow: "hidden", marginTop: 6, marginBottom: 16 },
  areaFill: (pct, color) => ({ height: "100%", borderRadius: 4, background: color, width: `${pct}%`, transition: "width 1s ease" }),
};

// ═══════════════════════════════════════
// STAR BACKGROUND
// ═══════════════════════════════════════

function Stars() {
  const stars = Array.from({ length: 20 }, (_, i) => ({
    left: `${Math.random() * 100}%`,
    top: `${Math.random() * 100}%`,
    size: Math.random() * 2 + 1,
    delay: Math.random() * 3,
    duration: Math.random() * 2 + 2
  }));
  return (
    <div style={S.stars}>
      {stars.map((s, i) => (
        <div key={i} style={{ position: "absolute", left: s.left, top: s.top, width: s.size, height: s.size, borderRadius: "50%", background: "rgba(245,240,255,0.4)", animation: `twinkle ${s.duration}s ease-in-out ${s.delay}s infinite` }} />
      ))}
      <style>{`@keyframes twinkle { 0%,100% { opacity:0.2; } 50% { opacity:1; } }`}</style>
    </div>
  );
}

// ═══════════════════════════════════════
// COUNTER ANIMATION
// ═══════════════════════════════════════

function AnimNum({ target, duration = 1500 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      setVal(Math.round(p * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target]);
  return <span>{val}</span>;
}

// ═══════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════

function LoveRadar() {
  const [phase, setPhase] = useState("start");
  const [step, setStep] = useState(0);
  const [p0, setP0] = useState({});
  const [selType, setSelType] = useState(null);
  const [p2Ans, setP2Ans] = useState({});
  const [p2Sel, setP2Sel] = useState({});
  const [p3Ans, setP3Ans] = useState({});
  const [p3Sel, setP3Sel] = useState({});
  const [results, setResults] = useState(null);
  const [fade, setFade] = useState(true);
  const [openTip, setOpenTip] = useState(null);

  const transition = (fn) => {
    setFade(false);
    setTimeout(() => { fn(); setFade(true); }, 250);
  };

  // Get period text for Q7
  const period = PERIOD_MAP[p0.frequency] || "며칠";

  // Replace {period} in questions
  const getQ = (q) => q.q.replace("{period}", period);

  // ── START ──
  if (phase === "start") {
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, ...S.content, textAlign: "center", justifyContent: "center", opacity: fade ? 1 : 0, transition: "opacity 0.3s" }}>
          <div style={{ width: 72, height: 72, borderRadius: 20, background: "linear-gradient(135deg, #B8A0E8, #9B7FD4)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, margin: "0 auto 28px", boxShadow: "0 8px 32px rgba(184,160,232,0.25)" }}>💌</div>
          <div style={{ fontSize: 13, fontWeight: 500, color: "#B8A0E8", letterSpacing: 3, marginBottom: 20 }}>LOVERADAR</div>
          <h1 style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.4, marginBottom: 14, letterSpacing: -0.5 }}>
            지금 나의 사랑은<br /><span style={{ color: "#B8A0E8" }}>어디쯤에 있을까?</span>
          </h1>
          <p style={{ fontSize: 15, color: "#A99BC7", lineHeight: 1.8, marginBottom: 40 }}>
            사랑하고 있는 건 아는데, 예전 같지 않은 것 같을 때.<br />
            이게 권태기인지, 진짜 식은 건지, 그냥 피곤한 건지.<br />
            러브레이더가 알려드릴게요.
          </p>
          <button style={S.cta()} onClick={() => transition(() => setPhase("p0"))}>
            테스트 시작하기
          </button>
          <p style={{ fontSize: 12, color: "#6B5E82", marginTop: 16 }}>약 3~5분 소요</p>
        </div>
      </div>
    );
  }

  // ── PHASE 0 ──
  if (phase === "p0") {
    const cur = PHASE0[step];
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, opacity: fade ? 1 : 0, transition: "opacity 0.25s" }}>
          <div style={S.progress}><div style={S.progressFill((step + 1) / PHASE0.length * 100)} /></div>
          <div style={S.content}>
            <div style={S.phaseLabel}>기본 정보 · {step + 1}/{PHASE0.length}</div>
            <div style={S.question}>{cur.q}</div>
            {cur.options.map((opt, i) => (
              <button key={i} style={S.optBtn(p0[cur.id] === opt)} onClick={() => {
                const next = { ...p0, [cur.id]: opt };
                setP0(next);
                setTimeout(() => {
                  transition(() => {
                    if (step < PHASE0.length - 1) setStep(step + 1);
                    else { setStep(0); setPhase("p1"); }
                  });
                }, 200);
              }}>{opt}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── PHASE 1: TYPE SELECT ──
  if (phase === "p1") {
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, opacity: fade ? 1 : 0, transition: "opacity 0.25s" }}>
          <div style={{ ...S.content, justifyContent: "flex-start", paddingTop: 32 }}>
            <div style={S.phaseLabel}>나의 사랑 유형</div>
            <div style={{ ...S.question, marginBottom: 8 }}>당신은 어떤 유형인가요?</div>
            <p style={{ fontSize: 14, color: "#A99BC7", marginBottom: 24, lineHeight: 1.7 }}>가장 가까운 유형을 선택해주세요.</p>
            {TYPES.map(t => (
              <div key={t.id} style={S.typeCard(t.color, selType === t.id)} onClick={() => setSelType(t.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                  <span style={{ fontSize: 28 }}>{t.emoji}</span>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: t.color }}>{t.name}</div>
                    <div style={{ fontSize: 12, color: "#A99BC7" }}>{t.attr}</div>
                  </div>
                </div>
                <p style={{ fontSize: 13, color: "#A99BC7", lineHeight: 1.7, margin: 0 }}>{t.desc}</p>
              </div>
            ))}
            {selType && (
              <button style={S.cta(TYPES.find(t => t.id === selType)?.color)} onClick={() => {
                transition(() => { setStep(0); setPhase("p2"); });
              }}>
                선택 완료
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── PHASE 2: SURVEY ──
  if (phase === "p2") {
    const typeQs = TYPE_QS[selType] || FIRE_QS;
    const cur = typeQs[step];
    const typeColor = TYPES.find(t => t.id === selType)?.color || "#FF8A8A";
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, opacity: fade ? 1 : 0, transition: "opacity 0.25s" }}>
          <div style={S.progress}><div style={S.progressFill((step + 1) / typeQs.length * 100, typeColor)} /></div>
          <div style={S.content}>
            <div style={S.phaseLabel}>{cur.area} · {step + 1}/{typeQs.length}</div>
            <div style={S.question}>{getQ(cur)}</div>
            {cur.opts.map(([label, score], i) => (
              <button key={i} style={S.optBtn(p2Sel[cur.id] === i)} onClick={() => {
                const nextAns = { ...p2Ans, [cur.id]: score };
                const nextSel = { ...p2Sel, [cur.id]: i };
                setP2Ans(nextAns);
                setP2Sel(nextSel);
                setTimeout(() => {
                  transition(() => {
                    if (step < typeQs.length - 1) setStep(step + 1);
                    else { setStep(0); setPhase("p3"); }
                  });
                }, 200);
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── PHASE 3: DIAGNOSIS ──
  if (phase === "p3") {
    const cur = DIAG_QS[step];
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, opacity: fade ? 1 : 0, transition: "opacity 0.25s" }}>
          <div style={S.progress}><div style={S.progressFill((step + 1) / DIAG_QS.length * 100, "#B8A0E8")} /></div>
          <div style={S.content}>
            <div style={S.phaseLabel}>마지막 질문 · {step + 1}/{DIAG_QS.length}</div>
            <div style={S.question}>{cur.q}</div>
            {cur.opts.map(([label, tag], i) => (
              <button key={i} style={S.optBtn(p3Sel[cur.id] === i)} onClick={() => {
                const nextAns = { ...p3Ans, [cur.id]: tag };
                const nextSel = { ...p3Sel, [cur.id]: i };
                setP3Ans(nextAns);
                setP3Sel(nextSel);
                setTimeout(() => {
                  transition(() => {
                    if (step < DIAG_QS.length - 1) setStep(step + 1);
                    else { setPhase("loading"); }
                  });
                }, 200);
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── LOADING ──
  if (phase === "loading") {
    setTimeout(() => {
      const scores = calcScores(p2Ans);
      const diag = calcDiagnosis(p3Ans, scores.total);
      const boost = getBoostComment(p0, diag);
      setResults({ scores, diag, boost });
      setPhase("result");
    }, 2500);
    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, ...S.content, textAlign: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 24, animation: "pulse 1.5s ease-in-out infinite" }}>🔮</div>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>당신의 사랑을 분석하고 있어요</div>
          <div style={{ fontSize: 14, color: "#A99BC7" }}>잠시만 기다려주세요...</div>
          <style>{`@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }`}</style>
          <div style={{ marginTop: 32, height: 4, borderRadius: 2, background: "#2A1F4E", overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 2, background: "linear-gradient(90deg, #FF8A8A, #B8A0E8, #7EB5E8)", animation: "loadbar 2.5s ease forwards" }} />
          </div>
          <style>{`@keyframes loadbar { 0% { width:0%; } 100% { width:100%; } }`}</style>
        </div>
      </div>
    );
  }

  // ── RESULT ──
  if (phase === "result" && results) {
    const { scores, diag, boost } = results;
    const typeData = TYPES.find(t => t.id === selType) || TYPES[0];
    const diagLabel = getDiagLabel(diag);
    const diagEmoji = getDiagEmoji(diag);
    const diagColor = getDiagColor(diag);
    const diagDesc = getDiagDesc(diag, selType);

    return (
      <div style={S.wrap}>
        <Stars />
        <div style={{ ...S.inner, paddingTop: 32, paddingBottom: 60, position: "relative", zIndex: 1 }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <span style={{ fontSize: 48, display: "block", marginBottom: 12 }}>{typeData.emoji}</span>
            <div style={{ fontSize: 24, fontWeight: 700, color: typeData.color, marginBottom: 4 }}>{typeData.name}</div>
            <div style={{ fontSize: 13, color: "#A99BC7" }}>{typeData.attr}</div>
          </div>

          {/* Score */}
          <div style={{ textAlign: "center", marginBottom: 32, padding: "32px 0", background: "rgba(255,255,255,0.03)", borderRadius: 20, border: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ fontSize: 13, color: "#A99BC7", marginBottom: 8, letterSpacing: 1 }}>사랑 온도</div>
            <div style={{ fontSize: 56, fontWeight: 700, color: "#F5F0FF", lineHeight: 1 }}>
              <AnimNum target={scores.total} />
              <span style={{ fontSize: 24, color: "#A99BC7" }}>/100</span>
            </div>
          </div>

          {/* Diagnosis Badge */}
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={S.badge(diagColor)}>{diagEmoji} {diagLabel}</div>
          </div>

          {/* Area Breakdown */}
          <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 16, border: "1px solid rgba(255,255,255,0.06)", padding: "24px 20px", marginBottom: 24 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>영역별 분석</div>
            {scores.areas.map((a, i) => (
              <div key={i} style={{ marginBottom: openTip === i ? 4 : 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: "#A99BC7" }}>{a.label}</span>
                    <span onClick={() => setOpenTip(openTip === i ? null : i)} style={{ width: 18, height: 18, borderRadius: "50%", background: openTip === i ? typeData.color + "30" : "rgba(255,255,255,0.06)", border: `1px solid ${openTip === i ? typeData.color : "rgba(255,255,255,0.1)"}`, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: openTip === i ? typeData.color : "#6B5E82", cursor: "pointer", fontWeight: 700, transition: "all 0.2s" }}>?</span>
                  </div>
                  <span style={{ fontWeight: 600 }}>{Math.round(a.scaled)}/{a.maxScaled}</span>
                </div>
                {openTip === i && (
                  <div style={{ fontSize: 12, color: "#A99BC7", background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: "8px 12px", marginTop: 6, marginBottom: 4, lineHeight: 1.6, borderLeft: `2px solid ${typeData.color}40` }}>{a.tip}</div>
                )}
                <div style={S.areaBar}>
                  <div style={S.areaFill(a.pct, typeData.color)} />
                </div>
              </div>
            ))}
          </div>

          {/* Diagnosis Description */}
          <div style={{ background: `${diagColor}10`, borderRadius: 16, border: `1px solid ${diagColor}30`, padding: "22px 20px", marginBottom: 24 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: diagColor, marginBottom: 8 }}>{diagEmoji} {diagLabel}</div>
            <p style={{ fontSize: 14, color: "#B8AED4", lineHeight: 1.9, margin: 0 }}>{diagDesc}</p>
          </div>

          {/* Boost Comment */}
          {boost && (
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, border: "1px solid rgba(255,255,255,0.06)", padding: "18px 20px", marginBottom: 24 }}>
              <div style={{ fontSize: 12, color: "#A99BC7", marginBottom: 6, letterSpacing: 0.5 }}>📋 참고 사항</div>
              <p style={{ fontSize: 13, color: "#B8AED4", lineHeight: 1.8, margin: 0 }}>{boost}</p>
            </div>
          )}

          {/* Type Insight */}
          <div style={{ background: `${typeData.color}10`, borderRadius: 16, border: `1px solid ${typeData.color}30`, padding: "22px 20px", marginBottom: 32 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: typeData.color, marginBottom: 8 }}>{typeData.emoji} {typeData.name} 유형 인사이트</div>
            <p style={{ fontSize: 13, color: "#B8AED4", lineHeight: 1.9, margin: 0 }}>
              {selType === "fire" && "불꽃 유형에게 사랑은 표현이에요. 표현하고 싶은 충동이 자연스럽게 올라오고 있다면, 당신의 사랑은 건강해요. 반대로, 하고 싶은 마음 자체가 안 올라온다면 지금 상태를 직면해볼 필요가 있어요."}
              {selType === "tree" && "나무 유형에게 사랑은 돌봄이에요. 챙겨주는 게 기쁘다면 당신의 사랑은 건강해요. 만약 의무감으로 하고 있다면, 잠시 멈추고 나 자신을 먼저 돌볼 시간이 필요해요."}
              {selType === "moon" && "달빛 유형에게 사랑은 내면의 울림이에요. 혼자 있을 때 애인이 자연스럽게 스며들고 있다면 건강한 거예요. 만나기 귀찮은 건 원래 그래요 — 생각 자체가 안 나는지가 진짜 기준이에요."}
              {selType === "wind" && "바람 유형에게 사랑은 허락이에요. 내 영역에 상대가 들어와 있는 것 자체가 큰 사랑의 증거예요. 거리를 두는 건 자연스러운 거고, 다가와도 무감각한 게 진짜 위험 신호예요."}
            </p>
          </div>

          {/* Share / Restart */}
          <button style={S.cta(typeData.color)} onClick={() => {
            setPhase("start"); setStep(0); setP0({}); setSelType(null); setP2Ans({}); setP2Sel({}); setP3Ans({}); setP3Sel({}); setResults(null); setOpenTip(null);
          }}>
            다시 테스트하기
          </button>
          <p style={{ textAlign: "center", fontSize: 12, color: "#6B5E82", marginTop: 16 }}>loverader.life</p>
        </div>
      </div>
    );
  }

  return null;
}


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(LoveRadar));
    </script>
